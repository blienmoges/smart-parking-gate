<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartParking | License Plate Recognition</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #1e293b;
            --success: #22c55e;
            --danger: #ef4444; /* Added for Access Denied */
            --bg: #f3f4f6;
            --text-muted: #6b7280;
            --border-soft: #dbeafe;
            --panel-border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: var(--secondary);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            color: var(--secondary);
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .main-content {
            display: flex;
            gap: 28px;
            align-items: stretch;
        }

        .upload-section,
        .result-area {
            flex: 1;
            min-width: 0;
        }

        .upload-section {
            border: 2px dashed #bfd7fb;
            border-radius: 24px;
            background: #fafafa;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px 24px;
            text-align: center;
            transition: 0.3s ease;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background: #f8fbff;
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        .upload-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #111827;
        }

        .upload-subtext {
            font-size: 0.98rem;
            color: var(--text-muted);
            margin-bottom: 18px;
        }

        .or-text {
            color: #6b7280;
            margin: 10px 0 14px;
            font-size: 0.95rem;
        }

        input[type="file"] {
            display: block;
            max-width: 100%;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }

        input[type="file"]::file-selector-button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--primary-dark);
        }

        .supported-files {
            margin-top: 6px;
            font-size: 0.9rem;
            color: #9ca3af;
        }

        button {
            margin-top: 18px;
            width: 100%;
            max-width: 260px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 999px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            margin: 18px auto 0;
            border: 4px solid #eef2f7;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            animation: spin 1s linear infinite;
        }

        .result-area {
            background: #ffffff;
            border-radius: 24px;
            padding: 8px 4px 8px 4px;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
        }

        .result-card {
            border-radius: 20px;
            background: #fafafa;
            border: 1px solid var(--panel-border);
            padding: 22px;
            height: 100%;
            min-height: 420px;
            display: flex;
            flex-direction: column;
        }

        .result-heading {
            font-size: 1.1rem;
            font-weight: 700;
            text-align: left;
            margin-bottom: 18px;
            color: #111827;
        }

        .plate-badge {
            display: inline-block;
            align-self: flex-start;
            background: var(--secondary);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px; /* Adjusted margin */
        }

        /* NEW STATUS BADGE STYLE */
        .status-badge {
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 18px;
            text-transform: uppercase;
        }

        .image-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 14px;
            overflow: hidden;
        }

        #annotated-image {
            width: 100%;
            max-height: 320px;
            object-fit: contain;
            border-radius: 12px;
            border: 3px solid #dcfce7;
            box-shadow: 0 6px 14px rgba(0,0,0,0.06);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }

            .upload-section,
            .result-card {
                min-height: auto;
            }

            #annotated-image {
                max-height: 260px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚗 SmartParking AI</h1>
        <p>Automated License Plate Recognition System</p>
    </div>

    <div class="main-content">
        <div class="upload-section">
            <div class="upload-icon">
                <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 16V4"></path>
                    <path d="M8 8l4-4 4 4"></path>
                    <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"></path>
                </svg>
            </div>

            <div class="upload-title">Drag and Drop files to upload</div>
            <div class="or-text">or</div>

            <input type="file" id="imageInput" accept="image/*">

            <div class="supported-files">Supported files: JPG, PNG, JPEG</div>

            <button id="processBtn" onclick="processImage()">Analyze Image</button>
            <div class="loader" id="loader"></div>
        </div>

        <div id="resultArea" class="result-area">
            <div class="result-card">
                <div class="result-heading">Detection Result</div>
                <div class="plate-badge" id="plateNumber">-------</div>
                <div class="status-badge" id="accessStatus"></div>

                <div class="image-wrapper">
                    <img id="annotated-image" src="" alt="Detection Result">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function processImage() {
        const fileInput = document.getElementById('imageInput');
        const btn = document.getElementById('processBtn');
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('resultArea');
        const plateNumber = document.getElementById('plateNumber');
        const accessStatus = document.getElementById('accessStatus'); // Target new element
        const resultImg = document.getElementById('annotated-image');

        if (!fileInput.files[0]) {
            alert("Please select a car image first.");
            return;
        }

        btn.disabled = true;
        loader.style.display = "block";
        resultArea.style.display = "none";

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        try {
            const response = await fetch('http://127.0.0.1:9000/predict', {
                method: "POST",
                headers: {
                    "Authorization": "SmartParking_2026_Secure"
                },
                body: formData
            });

            const data = await response.json();

            if (data.detections && data.detections.length > 0) {
                const detection = data.detections[0];
                plateNumber.innerText = detection.plate_number;
                
                // --- LOGIC TO SHOW GRANTED OR DENIED ---
                accessStatus.innerText = detection.status; 
                if (detection.status === "Access Granted") {
                    accessStatus.style.color = "var(--success)";
                } else {
                    accessStatus.style.color = "var(--danger)";
                }

                resultImg.src = data.annotated_image;
                resultArea.style.display = "flex";
            } else {
                alert("No license plate detected.");
            }
        } catch (error) {
            console.error(error);
            alert("Check if your api.py is running!");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
